<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#050505" />
    <title>Teen Wallet</title>
    <link rel="preconnect" href="https://teen-wallet.lovable.app" crossorigin />
    <link rel="dns-prefetch" href="https://teen-wallet.lovable.app" />
    <link rel="preload" as="document" href="https://teen-wallet.lovable.app/" />
    <style>
      :root { color-scheme: dark; --bg: #050505; --fg: #fff; --muted: rgba(255,255,255,0.6); }
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      html, body {
        margin: 0; padding: 0; height: 100%; width: 100%;
        background: var(--bg); color: var(--fg);
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
        overflow: hidden; -webkit-font-smoothing: antialiased;
        overscroll-behavior: none; user-select: none; -webkit-user-select: none;
      }
      .stage { position: fixed; inset: 0; display: none; flex-direction: column; }
      .stage.active { display: flex; }

      /* ============ SPLASH ============ */
      #splash {
        align-items: center; justify-content: center;
        background:
          radial-gradient(1200px 600px at 50% 20%, rgba(99,102,241,0.12), transparent 60%),
          radial-gradient(900px 500px at 50% 90%, rgba(236,72,153,0.08), transparent 60%),
          var(--bg);
      }
      .logo {
        width: 120px; height: 120px; border-radius: 30px;
        background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #ec4899 100%);
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 22px 48px -14px rgba(139, 92, 246, 0.55), inset 0 1px 0 rgba(255,255,255,0.18);
        animation: pulse 2.4s ease-in-out infinite;
      }
      .logo-text { font-size: 48px; font-weight: 800; letter-spacing: -2px; color: #fff; }
      .brand-track {
        margin-top: 28px;
        font-size: 11px; font-weight: 300; letter-spacing: 0.5em;
        color: rgba(255,255,255,0.85);
      }
      .splash-dots {
        position: absolute; bottom: max(40px, env(safe-area-inset-bottom));
        display: flex; gap: 6px;
      }
      .splash-dots i {
        width: 6px; height: 6px; border-radius: 50%;
        background: #6366f1; opacity: 0.55;
        animation: pulseRing 1.4s ease-in-out infinite;
      }
      .splash-dots i:nth-child(2) { animation-delay: 200ms; }
      .splash-dots i:nth-child(3) { animation-delay: 400ms; }

      /* ============ ONBOARDING ============ */
      #onboarding { background: var(--bg); position: fixed; inset: 0; }
      .ob-ambient {
        position: absolute; inset: 0; pointer-events: none;
        transition: background 600ms ease;
      }
      .ob-grain {
        position: absolute; inset: 0; pointer-events: none; opacity: 0.04;
        background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.5'/></svg>");
      }
      .ob-top {
        position: relative; z-index: 10;
        display: flex; align-items: center; justify-content: space-between;
        padding: max(16px, env(safe-area-inset-top)) 20px 0;
      }
      .ob-dots { display: flex; align-items: center; gap: 6px; }
      .ob-dot {
        width: 6px; height: 6px; border-radius: 999px;
        background: rgba(255,255,255,0.25);
        transition: width 300ms ease, background 300ms ease;
        cursor: pointer; border: none; padding: 0;
      }
      .ob-dot.active { width: 18px; background: #fff; }
      .ob-skip {
        background: transparent; border: none;
        color: rgba(255,255,255,0.6); font-size: 13px; font-weight: 500;
        padding: 6px 8px; cursor: pointer;
      }

      .ob-stage {
        flex: 1; display: flex; flex-direction: column;
        align-items: center; justify-content: flex-start;
        padding: 8px 24px 0; position: relative; z-index: 5;
      }
      .ob-stage.fwd { animation: slideInR 380ms cubic-bezier(.22,.61,.36,1); }
      .ob-stage.back { animation: slideInL 380ms cubic-bezier(.22,.61,.36,1); }

      .ob-logo-wrap {
        margin-top: 16px; display: flex; flex-direction: column; align-items: center;
      }
      .ob-mini-logo {
        width: 56px; height: 56px; border-radius: 16px;
        background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #ec4899 100%);
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 12px 28px -10px rgba(139,92,246,0.5);
      }
      .ob-mini-logo span { font-size: 24px; font-weight: 800; letter-spacing: -1px; color: #fff; }
      .ob-brand-word { margin-top: 6px; font-size: 10px; font-weight: 500; letter-spacing: 0.42em; color: rgba(255,255,255,0.7); }

      .ob-hero-wrap {
        position: relative; width: 240px; height: 240px;
        display: flex; align-items: center; justify-content: center;
      }
      .ob-hero-glow {
        position: absolute; inset: -20px; border-radius: 50%;
        background: radial-gradient(circle, rgba(139,92,246,0.28), transparent 65%);
        filter: blur(20px); pointer-events: none;
      }
      .ob-hero-img {
        position: relative; width: 100%; height: 100%; border-radius: 32px;
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 24px 48px -16px rgba(0,0,0,0.6);
      }
      .ob-hero-img svg { width: 88px; height: 88px; color: rgba(255,255,255,0.95); }

      .ob-icon-badge {
        margin-top: 12px; width: 40px; height: 40px; border-radius: 12px;
        background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
        display: flex; align-items: center; justify-content: center;
        backdrop-filter: blur(10px);
      }
      .ob-icon-badge svg { width: 20px; height: 20px; color: #fff; }

      .ob-title {
        margin: 16px 0 0; font-size: 26px; font-weight: 700; line-height: 1.2;
        letter-spacing: -0.5px; text-align: center; color: #fff;
        max-width: 320px;
      }
      .ob-accent-pink { background: linear-gradient(90deg, #ff5d8f, #c026d3); -webkit-background-clip: text; background-clip: text; color: transparent; }
      .ob-accent-blue { background: linear-gradient(90deg, #38bdf8, #6366f1); -webkit-background-clip: text; background-clip: text; color: transparent; }
      .ob-accent-purple { background: linear-gradient(90deg, #a855f7, #6366f1); -webkit-background-clip: text; background-clip: text; color: transparent; }
      .ob-accent-orange { background: linear-gradient(90deg, #fb923c, #f43f5e); -webkit-background-clip: text; background-clip: text; color: transparent; }

      .ob-sub {
        margin: 12px 0 0; text-align: center; max-width: 300px;
        font-size: 14px; line-height: 1.5; color: rgba(255,255,255,0.6);
      }

      .ob-footer {
        position: relative; z-index: 10;
        padding: 8px 24px max(28px, env(safe-area-inset-bottom));
      }
      .ob-cta {
        width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px;
        padding: 16px 24px; border-radius: 999px; border: none;
        background: #fff; color: #0a0a0a;
        font-size: 15px; font-weight: 600; letter-spacing: -0.2px;
        cursor: pointer;
        box-shadow: 0 12px 32px -10px rgba(255,255,255,0.25);
        transition: transform 120ms ease;
      }
      .ob-cta:active { transform: scale(0.98); }
      .ob-cta-arrow {
        width: 26px; height: 26px; border-radius: 50%;
        background: #0a0a0a; color: #fff;
        display: inline-flex; align-items: center; justify-content: center;
      }
      .ob-cta-arrow svg { width: 14px; height: 14px; }
      .ob-tagline { text-align: center; font-size: 11.5px; color: rgba(255,255,255,0.45); margin: 12px 0 0; }
      .ob-nav-row { display: flex; align-items: center; justify-content: space-between; }
      .ob-nav-circle {
        width: 48px; height: 48px; border-radius: 50%;
        background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
        display: inline-flex; align-items: center; justify-content: center;
        cursor: pointer;
      }
      .ob-nav-circle.light { background: #fff; border-color: #fff; }
      .ob-nav-circle svg { width: 16px; height: 16px; color: #fff; }
      .ob-nav-circle.light svg { color: #0a0a0a; }

      /* ============ HANDOFF / OFFLINE ============ */
      #handoff {
        align-items: center; justify-content: center;
        background: var(--bg);
      }
      .spinner {
        width: 32px; height: 32px; border-radius: 50%;
        border: 2.5px solid rgba(255,255,255,0.15);
        border-top-color: #8b5cf6;
        animation: spin 700ms linear infinite;
      }
      .handoff-text { margin-top: 18px; font-size: 13px; color: var(--muted); }

      #offline {
        align-items: center; justify-content: center;
        background: var(--bg); padding: 32px; text-align: center;
      }
      #offline h2 { font-size: 20px; font-weight: 600; margin: 16px 0 8px; }
      #offline p { font-size: 14px; color: var(--muted); max-width: 280px; line-height: 1.5; margin: 0 0 24px; }
      #offline button {
        appearance: none; border: none; padding: 12px 28px; border-radius: 999px;
        background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff;
        font-size: 14px; font-weight: 600; cursor: pointer;
        box-shadow: 0 8px 24px -8px rgba(99,102,241,0.55);
      }
      .retry-status {
        margin-top: 14px; font-size: 12px; color: rgba(255,255,255,0.5);
        min-height: 16px;
      }
      .err-panel {
        margin-top: 18px; width: 100%; max-width: 360px;
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 14px; padding: 12px 14px; text-align: left;
      }
      .err-panel summary {
        cursor: pointer; font-size: 12px; font-weight: 600;
        color: rgba(255,255,255,0.75); list-style: none;
        display: flex; align-items: center; justify-content: space-between;
      }
      .err-panel summary::-webkit-details-marker { display: none; }
      .err-panel summary::after { content: "▾"; opacity: 0.5; font-size: 10px; }
      .err-panel[open] summary::after { content: "▴"; }
      .err-rows { margin-top: 10px; display: grid; gap: 6px; }
      .err-row { display: grid; grid-template-columns: 88px 1fr; gap: 8px; font-size: 11.5px; }
      .err-k { color: rgba(255,255,255,0.45); }
      .err-v { color: rgba(255,255,255,0.85); word-break: break-word; font-family: ui-monospace, "SF Mono", Menlo, monospace; }
      .err-actions { margin-top: 10px; display: flex; gap: 8px; }
      .err-actions button {
        flex: 1; appearance: none; border: 1px solid rgba(255,255,255,0.12);
        background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.85);
        padding: 8px 10px; border-radius: 10px; font-size: 11.5px; font-weight: 500;
        cursor: pointer; box-shadow: none;
      }

      /* ============ ANIMATIONS ============ */
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.04); }
      }
      @keyframes pulseRing {
        0%, 100% { opacity: 0.35; transform: scale(0.9); }
        50% { opacity: 1; transform: scale(1.2); }
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes slideInR {
        from { opacity: 0; transform: translateX(24px); }
        to   { opacity: 1; transform: translateX(0); }
      }
      @keyframes slideInL {
        from { opacity: 0; transform: translateX(-24px); }
        to   { opacity: 1; transform: translateX(0); }
      }
      @media (prefers-reduced-motion: reduce) {
        .logo, .splash-dots i, .ob-stage, .spinner { animation: none !important; }
      }
    </style>
  </head>
  <body>
    <!-- SPLASH -->
    <div id="splash" class="stage active" role="status" aria-live="polite" aria-label="Teen Wallet is loading">
      <div class="logo"><span class="logo-text">T</span></div>
      <div class="brand-track">TEEN WALLET</div>
      <div class="splash-dots"><i></i><i></i><i></i></div>
    </div>

    <!-- ONBOARDING -->
    <div id="onboarding" class="stage">
      <div class="ob-ambient" id="ob-ambient" aria-hidden="true"></div>
      <div class="ob-grain" aria-hidden="true"></div>

      <div class="ob-top">
        <div class="ob-dots" id="ob-dots" role="tablist" aria-label="Onboarding slides"></div>
        <button class="ob-skip" id="ob-skip" type="button">Skip</button>
      </div>

      <div class="ob-stage fwd" id="ob-stage">
        <!-- filled by JS -->
      </div>

      <div class="ob-footer" id="ob-footer">
        <!-- filled by JS -->
      </div>
    </div>

    <!-- HANDOFF (loading the real app) -->
    <div id="handoff" class="stage">
      <div class="logo" style="width: 80px; height: 80px; border-radius: 22px;">
        <span class="logo-text" style="font-size: 32px;">T</span>
      </div>
      <div class="spinner" style="margin-top: 24px;"></div>
      <div class="handoff-text">Almost there…</div>
    </div>

    <!-- APP IFRAME (mounted once handoff completes) -->
    <iframe
      id="app-frame"
      title="Teen Wallet"
      style="display:none; position:fixed; inset:0; width:100%; height:100%; border:0; background:#050505; z-index: 100;"
      allow="camera; microphone; geolocation; clipboard-read; clipboard-write; payment; fullscreen"
      referrerpolicy="origin"
    ></iframe>

    <!-- OFFLINE -->
    <div id="offline" class="stage" role="alert">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 1l22 22"/><path d="M16.72 11.06A10.94 10.94 0 0119 12.55"/><path d="M5 12.55a10.94 10.94 0 015.17-2.39"/><path d="M10.71 5.05A16 16 0 0122.58 9"/><path d="M1.42 9a15.91 15.91 0 014.7-2.88"/><path d="M8.53 16.11a6 6 0 016.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/>
      </svg>
      <h2>You're offline</h2>
      <p>Teen Wallet needs an internet connection to start. Check your network and try again.</p>
      <button id="offline-retry" type="button">Try again</button>
    </div>

    <script>
      (function () {
        var APP_URL = "https://teen-wallet.lovable.app/";
        var ONBOARDING_KEY = "tw-onboarding-state-v1";

        // ----- stage controller -----
        var stages = {
          splash: document.getElementById("splash"),
          onboarding: document.getElementById("onboarding"),
          handoff: document.getElementById("handoff"),
          offline: document.getElementById("offline"),
        };
        function show(name) {
          Object.keys(stages).forEach(function (k) { stages[k].classList.toggle("active", k === name); });
        }

        // ----- localStorage helpers (mirror src/screens/Onboarding.tsx) -----
        function readOnboardingState() {
          try { return JSON.parse(localStorage.getItem(ONBOARDING_KEY) || "null"); } catch (e) { return null; }
        }
        function writeOnboardingState(s) {
          try { localStorage.setItem(ONBOARDING_KEY, JSON.stringify(s)); } catch (e) {}
        }
        function hasCompletedOnboarding() {
          var s = readOnboardingState();
          return !!(s && s.completed);
        }

        // ----- onboarding slides (visual parity with src/screens/Onboarding.tsx) -----
        var SLIDES = [
          {
            gradient: "linear-gradient(135deg, #ff5d8f 0%, #c026d3 60%, #4f46e5 100%)",
            ambient: "radial-gradient(800px 500px at 30% 20%, rgba(236,72,153,0.18), transparent 60%)",
            icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="14" rx="3"/><path d="M2 10h20"/><circle cx="17" cy="15" r="1.5"/></svg>',
            badge: null,
            title: 'Payments for the<br><span class="ob-accent-pink">new gen champions.</span>',
            sub: "Fast. Secure. Rewarding.",
            showLogo: true,
          },
          {
            gradient: "linear-gradient(135deg, #38bdf8 0%, #6366f1 60%, #1e1b4b 100%)",
            ambient: "radial-gradient(800px 500px at 70% 20%, rgba(99,102,241,0.22), transparent 60%)",
            icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>',
            badge: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>',
            title: 'Lightning fast<br><span class="ob-accent-blue">payments</span>',
            sub: "Send or receive money in seconds using UPI. No delays, just instant vibes.",
            showLogo: false,
          },
          {
            gradient: "linear-gradient(135deg, #a855f7 0%, #6366f1 60%, #1e1b4b 100%)",
            ambient: "radial-gradient(800px 500px at 50% 10%, rgba(168,85,247,0.22), transparent 60%)",
            icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M9 12l2 2 4-4"/></svg>',
            badge: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M9 12l2 2 4-4"/></svg>',
            title: 'Secure beyond<br><span class="ob-accent-purple">limits</span>',
            sub: "Bank-grade security keeps your money and data always protected.",
            showLogo: false,
          },
          {
            gradient: "linear-gradient(135deg, #fb923c 0%, #f43f5e 60%, #7c2d12 100%)",
            ambient: "radial-gradient(800px 500px at 50% 90%, rgba(251,146,60,0.22), transparent 60%)",
            icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/><line x1="12" y1="22" x2="12" y2="7"/><path d="M12 7H7.5a2.5 2.5 0 010-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 000-5C13 2 12 7 12 7z"/></svg>',
            badge: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/><line x1="12" y1="22" x2="12" y2="7"/><path d="M12 7H7.5a2.5 2.5 0 010-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 000-5C13 2 12 7 12 7z"/></svg>',
            title: 'Earn <span class="ob-accent-orange">rewards</span><br><span class="ob-accent-orange">every time</span>',
            sub: "Get TW Coins on every payment and unlock exciting rewards just for you.",
            showLogo: false,
          },
        ];

        var ARROW_R = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>';
        var ARROW_L = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>';

        var current = 0;
        var dotsEl = document.getElementById("ob-dots");
        var stageEl = document.getElementById("ob-stage");
        var footerEl = document.getElementById("ob-footer");
        var ambientEl = document.getElementById("ob-ambient");

        function renderDots() {
          dotsEl.innerHTML = "";
          SLIDES.forEach(function (_, idx) {
            var b = document.createElement("button");
            b.type = "button";
            b.className = "ob-dot" + (idx === current ? " active" : "");
            b.setAttribute("role", "tab");
            b.setAttribute("aria-selected", idx === current ? "true" : "false");
            b.setAttribute("aria-label", "Go to slide " + (idx + 1));
            b.addEventListener("click", function () { goTo(idx); });
            dotsEl.appendChild(b);
          });
        }

        function renderSlide(direction) {
          var s = SLIDES[current];
          ambientEl.style.background = s.ambient;
          stageEl.className = "ob-stage " + (direction === "back" ? "back" : "fwd");
          stageEl.innerHTML =
            (s.showLogo ? '<div class="ob-logo-wrap"><div class="ob-mini-logo"><span>T</span></div><div class="ob-brand-word">TEEN WALLET</div></div>' : "") +
            '<div class="ob-hero-wrap" style="margin-top:' + (s.showLogo ? "24px" : "32px") + '">' +
              '<div class="ob-hero-glow"></div>' +
              '<div class="ob-hero-img" style="background:' + s.gradient + '">' + s.icon + '</div>' +
            '</div>' +
            (s.badge ? '<div class="ob-icon-badge">' + s.badge + '</div>' : "") +
            '<h2 class="ob-title">' + s.title + '</h2>' +
            '<p class="ob-sub">' + s.sub + '</p>';

          var isFirst = current === 0;
          var isLast = current === SLIDES.length - 1;
          if (isFirst) {
            footerEl.innerHTML =
              '<button class="ob-cta" id="cta-next"><span>Get Started</span><span class="ob-cta-arrow">' + ARROW_R + '</span></button>' +
              '<p class="ob-tagline">Safe. Simple. Built for teens.</p>';
          } else if (isLast) {
            footerEl.innerHTML =
              '<button class="ob-cta" id="cta-next"><span>Let\'s Go!</span><span class="ob-cta-arrow">' + ARROW_R + '</span></button>';
          } else {
            footerEl.innerHTML =
              '<div class="ob-nav-row">' +
                '<button class="ob-nav-circle" id="cta-back" aria-label="Previous">' + ARROW_L + '</button>' +
                '<button class="ob-nav-circle light" id="cta-next" aria-label="Next">' + ARROW_R + '</button>' +
              '</div>';
          }

          var nextBtn = document.getElementById("cta-next");
          var backBtn = document.getElementById("cta-back");
          if (nextBtn) nextBtn.addEventListener("click", goNext);
          if (backBtn) backBtn.addEventListener("click", goBack);

          renderDots();
          writeOnboardingState({ slide: current, completed: false, updatedAt: new Date().toISOString() });
        }

        function goNext() {
          if (current === SLIDES.length - 1) { finish(); return; }
          current++; renderSlide("fwd");
        }
        function goBack() {
          if (current === 0) return;
          current--; renderSlide("back");
        }
        function goTo(idx) {
          if (idx === current) return;
          var dir = idx > current ? "fwd" : "back";
          current = idx; renderSlide(dir);
        }
        function finish() {
          writeOnboardingState({ slide: SLIDES.length - 1, completed: true, updatedAt: new Date().toISOString() });
          handoffToApp();
        }

        // ----- swipe -----
        var touchStart = null;
        document.getElementById("onboarding").addEventListener("touchstart", function (e) {
          touchStart = { x: e.touches[0].clientX, t: Date.now() };
        }, { passive: true });
        document.getElementById("onboarding").addEventListener("touchend", function (e) {
          if (!touchStart) return;
          var dx = e.changedTouches[0].clientX - touchStart.x;
          var dt = Math.max(1, Date.now() - touchStart.t);
          touchStart = null;
          if (dt > 600) return;
          var v = Math.abs(dx) / dt;
          if (Math.abs(dx) < 48 && v < 0.35) return;
          if (dx < 0) goNext(); else goBack();
        }, { passive: true });

        document.getElementById("ob-skip").addEventListener("click", finish);

        // ----- handoff to real app (via iframe, NOT window.location) -----
        // Why iframe: replacing window.location to a remote URL inside a
        // Capacitor WebView frequently leaves a blank screen if the network
        // is slow, DNS fails, or the WebView's navigation policy intercepts
        // the request. Hosting the live app in an in-shell iframe keeps the
        // shell alive so we can always recover into the offline screen.
        var handoffStarted = false;
        var handoffWatchdog = null;
        var appFrame = document.getElementById("app-frame");
        var appFrameLoaded = false;

        function clearHandoffWatchdog() {
          if (handoffWatchdog) { clearTimeout(handoffWatchdog); handoffWatchdog = null; }
        }
        function revealAppFrame() {
          appFrameLoaded = true;
          clearHandoffWatchdog();
          appFrame.style.display = "block";
          // Hide all shell stages once the live app is painted
          Object.keys(stages).forEach(function (k) { stages[k].classList.remove("active"); });
        }
        appFrame.addEventListener("load", function () {
          // The first 'load' event fires for about:blank too; only count real navigations.
          try {
            var src = appFrame.getAttribute("src") || "";
            if (src && src.indexOf("about:") !== 0) revealAppFrame();
          } catch (e) { revealAppFrame(); }
        });
        appFrame.addEventListener("error", function () {
          show("offline"); handoffStarted = false; clearHandoffWatchdog();
        });

        function doNavigate() {
          clearHandoffWatchdog();
          // Watchdog: if the iframe never loads within 15s, show offline.
          handoffWatchdog = setTimeout(function () {
            if (!appFrameLoaded) {
              show("offline");
              handoffStarted = false;
              appFrame.removeAttribute("src");
            }
          }, 15000);
          try {
            appFrame.src = APP_URL;
          } catch (e) {
            show("offline"); handoffStarted = false; clearHandoffWatchdog();
          }
        }
        function handoffToApp() {
          if (handoffStarted) {
            // Already loaded — just reveal it
            if (appFrameLoaded) { revealAppFrame(); return; }
            return;
          }
          handoffStarted = true;
          show("handoff");
          if (typeof navigator !== "undefined" && navigator.onLine === false) {
            setTimeout(function () {
              if (navigator.onLine === false) { show("offline"); handoffStarted = false; }
              else doNavigate();
            }, 1000);
            return;
          }
          // Tiny delay so the handoff spinner is visible (no flash)
          setTimeout(doNavigate, 250);
        }

        // ----- offline retry -----
        document.getElementById("offline-retry").addEventListener("click", function () {
          if (hasCompletedOnboarding()) handoffToApp();
          else { show("onboarding"); renderSlide("fwd"); }
        });
        window.addEventListener("online", function () {
          if (stages.offline.classList.contains("active")) handoffToApp();
        });

        // ----- boot decision -----
        function boot() {
          // Always show splash for at least 800ms for branding
          setTimeout(function () {
            if (hasCompletedOnboarding()) {
              // Returning user — go straight to the app
              handoffToApp();
            } else {
              // First-time user — show onboarding
              var saved = readOnboardingState();
              if (saved && typeof saved.slide === "number") {
                current = Math.min(Math.max(0, saved.slide), SLIDES.length - 1);
              }
              show("onboarding");
              renderSlide("fwd");
            }
          }, 800);
        }
        boot();
      })();
    </script>
  </body>
</html>
