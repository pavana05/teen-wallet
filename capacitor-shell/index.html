<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#050505" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Teen Wallet</title>
    <link rel="preconnect" href="https://teen-wallet.lovable.app" crossorigin />
    <link rel="dns-prefetch" href="https://teen-wallet.lovable.app" />
    <link rel="preload" as="document" href="https://teen-wallet.lovable.app/" />
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      html, body {
        margin: 0; padding: 0;
        height: 100%; width: 100%;
        background: #050505;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
        overscroll-behavior: none;
        user-select: none;
        -webkit-user-select: none;
      }
      .splash {
        position: fixed; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        background:
          radial-gradient(1200px 600px at 50% 20%, rgba(99,102,241,0.12), transparent 60%),
          radial-gradient(900px 500px at 50% 90%, rgba(236,72,153,0.08), transparent 60%),
          #050505;
        z-index: 10;
        transition: opacity 420ms ease-out;
        will-change: opacity;
      }
      .splash.hide { opacity: 0; pointer-events: none; }
      .logo-wrap {
        position: relative;
        width: 96px; height: 96px;
        display: flex; align-items: center; justify-content: center;
        margin-bottom: 28px;
      }
      .logo {
        width: 96px; height: 96px;
        border-radius: 24px;
        background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #ec4899 100%);
        display: flex; align-items: center; justify-content: center;
        box-shadow:
          0 18px 40px -12px rgba(139, 92, 246, 0.45),
          inset 0 1px 0 rgba(255,255,255,0.18);
        animation: pulse 2.4s ease-in-out infinite;
      }
      .logo-text {
        font-size: 38px; font-weight: 800;
        letter-spacing: -1.5px;
        color: #fff;
        text-shadow: 0 2px 8px rgba(0,0,0,0.25);
      }
      .brand {
        font-size: 22px;
        font-weight: 600;
        letter-spacing: -0.4px;
        color: #fff;
        opacity: 0.95;
        margin-bottom: 8px;
      }
      .tagline {
        font-size: 13px;
        color: rgba(255,255,255,0.55);
        margin-bottom: 36px;
        letter-spacing: 0.2px;
      }
      .progress {
        width: 120px; height: 3px;
        background: rgba(255,255,255,0.08);
        border-radius: 999px;
        overflow: hidden;
        position: relative;
      }
      .progress::after {
        content: "";
        position: absolute; top: 0; bottom: 0; left: -40%;
        width: 40%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.85), transparent);
        animation: slide 1.4s ease-in-out infinite;
      }
      .footer {
        position: absolute;
        bottom: max(24px, env(safe-area-inset-bottom));
        font-size: 11px;
        color: rgba(255,255,255,0.3);
        letter-spacing: 0.4px;
      }
      .offline {
        position: fixed; inset: 0;
        display: none;
        flex-direction: column;
        align-items: center; justify-content: center;
        padding: 32px;
        text-align: center;
        background: #050505;
        z-index: 20;
      }
      .offline.show { display: flex; }
      .offline h2 {
        font-size: 20px; font-weight: 600;
        margin: 16px 0 8px;
      }
      .offline p {
        font-size: 14px; color: rgba(255,255,255,0.55);
        max-width: 280px; line-height: 1.5;
        margin: 0 0 24px;
      }
      .retry {
        appearance: none; border: none;
        padding: 12px 28px;
        border-radius: 999px;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        color: #fff;
        font-size: 14px; font-weight: 600;
        cursor: pointer;
        box-shadow: 0 8px 24px -8px rgba(99,102,241,0.55);
      }
      iframe.app {
        position: fixed; inset: 0;
        width: 100%; height: 100%;
        border: 0;
        background: #050505;
        display: block;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); box-shadow: 0 18px 40px -12px rgba(139,92,246,0.45), inset 0 1px 0 rgba(255,255,255,0.18); }
        50% { transform: scale(1.04); box-shadow: 0 22px 48px -10px rgba(139,92,246,0.65), inset 0 1px 0 rgba(255,255,255,0.22); }
      }
      @keyframes slide {
        0% { left: -40%; }
        100% { left: 100%; }
      }
      @media (prefers-reduced-motion: reduce) {
        .logo { animation: none; }
        .progress::after { animation: none; left: 30%; }
      }
    </style>
  </head>
  <body>
    <div id="splash" class="splash" role="status" aria-live="polite" aria-label="Teen Wallet is loading">
      <div class="logo-wrap">
        <div class="logo"><span class="logo-text">T</span></div>
      </div>
      <div class="brand">Teen Wallet</div>
      <div class="tagline">Payments built for India's new gen</div>
      <div class="progress" aria-hidden="true"></div>
      <div class="footer">Made in India</div>
    </div>

    <div id="offline" class="offline" role="alert">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 1l22 22"/>
        <path d="M16.72 11.06A10.94 10.94 0 0119 12.55"/>
        <path d="M5 12.55a10.94 10.94 0 015.17-2.39"/>
        <path d="M10.71 5.05A16 16 0 0122.58 9"/>
        <path d="M1.42 9a15.91 15.91 0 014.7-2.88"/>
        <path d="M8.53 16.11a6 6 0 016.95 0"/>
        <line x1="12" y1="20" x2="12.01" y2="20"/>
      </svg>
      <h2>You're offline</h2>
      <p>Teen Wallet needs an internet connection. Check your network and try again.</p>
      <button class="retry" id="retry-btn" type="button">Try again</button>
    </div>

    <script>
      (function () {
        var APP_URL = "https://teen-wallet.lovable.app/";
        var splash = document.getElementById("splash");
        var offline = document.getElementById("offline");
        var retryBtn = document.getElementById("retry-btn");
        var loadAttempt = 0;

        function showOffline() {
          if (splash) splash.classList.add("hide");
          if (offline) offline.classList.add("show");
        }
        function hideOffline() {
          if (offline) offline.classList.remove("show");
        }

        function loadApp() {
          loadAttempt++;
          hideOffline();
          if (!navigator.onLine) {
            // Give the network a moment in case onLine is stale on cold boot
            setTimeout(function () {
              if (!navigator.onLine) showOffline();
              else doNavigate();
            }, 1200);
            return;
          }
          doNavigate();
        }

        function doNavigate() {
          // Smoothly fade out the splash just before navigating so the
          // transition into the real app feels continuous instead of a
          // white flash.
          if (splash) {
            splash.classList.add("hide");
            setTimeout(function () { window.location.replace(APP_URL); }, 380);
          } else {
            window.location.replace(APP_URL);
          }
        }

        if (retryBtn) retryBtn.addEventListener("click", loadApp);
        window.addEventListener("online", function () {
          if (offline && offline.classList.contains("show")) loadApp();
        });
        window.addEventListener("offline", showOffline);

        // Hold the branded splash for a minimum of ~700ms so users always
        // see Teen Wallet branding (not a flicker), then transition.
        setTimeout(loadApp, 700);
      })();
    </script>
  </body>
</html>
